name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '26 11 * * 0'   # Weekly scan

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: manual   # switched to manual for Django build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optional: set up Python for Django builds
      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: "3.14.2"

      - name: Install dependencies (Python only)
        if: matrix.language == 'python'
        run: |
          pip install --upgrade pip
          pip install -r PDMS/requirements.txt

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: +security-extended,security-and-quality

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo "Running manual build for PDMS Django project..."
          cd PDMS
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python manage.py collectstatic --noinput
          python manage.py migrate --noinput
          python manage.py test
          echo "Manual build completed successfully."

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
