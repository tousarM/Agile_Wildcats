name: Django Release CI/CD   # Workflow name

on:
  push:
    tags:
      - 'v*.*.*'   # Trigger only when a version tag is pushed (e.g., v1.0.0)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # Use Ubuntu runner

    steps:
      # Checkout code at the tagged commit
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python 3.14
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Run migrations
      - name: Run migrations
        run: |
          python manage.py migrate --noinput

      # Run tests
      - name: Run tests
        run: |
          python manage.py test

      # Build Docker image tagged with the release version
      - name: Build Docker image
        run: |
          VERSION=${GITHUB_REF#refs/tags/}   # Extract version from tag (e.g., v1.0.0)
          docker build -t agilewildcats/pdms:$VERSION .   # Build image with version tag

      # Push Docker image to Docker Hub with version tag + latest
      - name: Push Docker image to Docker Hub
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # Login to Docker Hub using secrets
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          # Push version tag
          docker push agilewildcats/pdms:$VERSION
          # Also tag and push as 'latest'
          docker tag agilewildcats/pdms:$VERSION agilewildcats/pdms:latest
          docker push agilewildcats/pdms:latest

      # Deploy to Kubernetes (using manifests in k8s/)
      - name: Deploy to Kubernetes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # Update Kubernetes deployment to use the new image version
          kubectl set image deployment/pdms-deployment pdms=agilewildcats/pdms:$VERSION
          # Wait for rollout to complete
          kubectl rollout status deployment/pdms-deployment
