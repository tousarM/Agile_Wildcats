name: Django CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python 3.14
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      # Install dependencies from PDMS/requirements.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r PDMS/requirements.txt

      # Run migrations with secret key
      - name: Run migrations
        env:
          SECRET_KEY: ${{ secrets.PDMS_secret_key }}
        run: |
          python PDMS/manage.py migrate --noinput

      # Run Django tests with secret key
      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.PDMS_secret_key }}
        run: |
          python PDMS/manage.py test

      # Build Docker image (Dockerfile inside PDMS/)
      - name: Build Docker image
        run: |
          docker build -t agile_wildcats_pdms -f PDMS/Dockerfile PDMS

      # Push Docker image to Docker Hub
      - name: Push Docker image to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag agile_wildcats_pdms ${{ secrets.DOCKER_USERNAME }}/agile_wildcats_pdms:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/agile_wildcats_pdms:latest
