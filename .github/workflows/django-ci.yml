name: Django CI/CD   # Workflow name

on:
  push:
    branches: [ "main" ]   # Trigger on push to main
  pull_request:
    branches: [ "main" ]   # Trigger on PRs to main
  release:
    types: [published]     # Trigger when a release is published

jobs:
  build:
    runs-on: ubuntu-latest   # Use Ubuntu runner

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3   # Pull repo code

      # Set up Python 3.14
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"    # Install Python 3.14

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r PDMS/requirements.txt   # Install project requirements

      # Run migrations
      - name: Run migrations
        env:
          SECRET_KEY: ${{ secrets.PDMS_secret_key }}   # Inject Django secret key
        run: |
          python PDMS/manage.py migrate --noinput

      # Run tests
      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.PDMS_secret_key }}
        run: |
          python PDMS/manage.py test

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -t agilewildcats/pdms -f PDMS/Dockerfile PDMS   # Build image

      # Push Docker image to Docker Hub
      - name: Push Docker image to Docker Hub
        run: |
          # Login with secrets (use an org admin account)
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          
          # Tag with 'latest'
          docker tag agilewildcats/pdms agilewildcats/pdms:latest
          docker push agilewildcats/pdms:latest
          
          # Tag with commit SHA
          docker tag agilewildcats/pdms agilewildcats/pdms:${{ github.sha }}
          docker push agilewildcats/pdms:${{ github.sha }}
          
          # Tag with release version (only runs on release event)
          if [ "${{ github.event_name }}" = "release" ]; then
            docker tag agilewildcats/pdms agilewildcats/pdms:${{ github.event.release.tag_name }}
            docker push agilewildcats/pdms:${{ github.event.release.tag_name }}
          fi
