name: Django PDMS CI/CD   # Unified workflow name

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt in to Node.js 24 now

on:
  push:
    branches: [ "main" ]       # Run CI/CD on pushes to main
    tags:
      - 'v*.*.*'               # Run CD when a version tag is pushed (e.g., v1.0.0)
  pull_request:
    branches: [ "main" ]       # Run CI on pull requests to main
  release:
    types: [published]         # Run CD when a release is published

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4   # updated to v4, Node.js 24 compatible

      # Set up Python 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14.2"

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r PDMS/requirements.txt

      # Run migrations
      - name: Run migrations
        working-directory: PDMS
        env:
          SECRET_KEY: ${{ secrets.PDMS_SECRET_KEY }}
        run: python manage.py migrate --noinput

      # Run tests
      - name: Run tests
        working-directory: PDMS
        env:
          SECRET_KEY: ${{ secrets.PDMS_SECRET_KEY }}
        run: python manage.py test

      # Collect static files
      - name: Collect static files
        working-directory: PDMS
        run: python manage.py collectstatic --noinput

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image with dynamic version
      - name: Build Docker image
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '-')-${GITHUB_SHA::7}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          docker build -t agilewildcats/pdms:$VERSION -t agilewildcats/pdms:latest -f PDMS/dockerfile PDMS

      # Push Docker image
      - name: Push Docker image
        run: |
          docker push agilewildcats/pdms:$VERSION
          docker push agilewildcats/pdms:latest

      # Deploy to Kubernetes (only on release/tag)
      - name: Deploy to Kubernetes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          kubectl set image deployment/pdms-deployment pdms=agilewildcats/pdms:$VERSION
          kubectl rollout status deployment/pdms-deployment --timeout=120s
