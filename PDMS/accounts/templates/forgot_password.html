<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background: linear-gradient(135deg, #1f2937, #111827);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial;
}
.login-card {
  background: white;
  padding: 40px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.login-title {
  text-align: center;
  margin-bottom: 25px;
  font-weight: 600;
}
.links { text-align: center; margin-top: 15px; }
.links a { text-decoration: none; font-size: 14px; }
</style>
</head>
<body>
<div class="login-card">
  <h3 class="login-title">Reset Password</h3>
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  <form method="POST">
    {% csrf_token %}
    <input class="form-control mb-3" type="text" name="username" placeholder="Username" required>
    <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
    <input class="form-control mb-3" type="password" name="old_password" placeholder="Current Password" required>
    <input class="form-control mb-3" type="password" name="new_password" placeholder="New Password" required>
    <button class="btn btn-primary w-100">Reset Password</button>
  </form>
  <div class="links">
    <a href="{% url 'login' %}">Back to Login</a>
  </div>
</div>
</body>
</html>
