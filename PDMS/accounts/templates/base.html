<!DOCTYPE html>
<html lang="en">
  <!-- Base HTML structure for PDMS -->
  <!-- Author: Simon Gawar Dak -->
  <!-- Date: 2026-25-02 -->
<head>
  <meta charset="UTF-8">
  <title>{% block title %}PDMS{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
    }
    header {
      background: #000; /* black header */
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    nav {
      background: #0056b3;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }
    footer {
      background: #007bff;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- Global header -->
  <header>
    <h1>PDMS-Agile Wildcats Project</h1>
  </header>

  <!-- Navigation bar -->
  <nav>
    <a href="{% url 'home' %}">Home</a>
    {% if request.user.profile.team %}
      <a href="{% url 'task_page' %}">Tasks</a>
      <a href="{% url 'team_page' %}">Team</a>
    {% else %}
      <a style="color: #7a9cc7; cursor: default; pointer-events: none;">Tasks</a>
      <a style="color: #7a9cc7; cursor: default; pointer-events: none;">Team</a>
    {% endif %}
    <a href="{% url 'logout' %}">Logout</a>
  </nav>

  <!-- Main content -->
  <div class="container mt-5">
    {% block content %}
    {% endblock %}
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; {% now "Y" %} PDMS Project — Developed by Agile Wildcats Team for Class Project SFWE 507</p>
  </footer>
</body>
</html>
