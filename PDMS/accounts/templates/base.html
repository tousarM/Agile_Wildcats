<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}PDMS{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
    }
    header {
      background: #000;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    nav {
      background: #0056b3;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      padding: clamp(16px, 2.5vw, 30px);
      width: min(1600px, calc(100vw - 24px));
      max-width: 100%;
      margin: auto;
    }
    footer {
      background: #007bff;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    .page-bottom-space {
      height: 70px;
    }
    @media (max-width: 767.98px) {
      nav a {
        display: inline-block;
        margin: 6px 10px;
      }
      .container {
        width: min(100%, calc(100vw - 12px));
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>PDMS-Agile Wildcats Project</h1>
  </header>

  <nav>
    <a href="{% url 'home' %}">Home</a>
    {% if request.user.is_authenticated %}
      <a href="{% url 'backlog_page' %}">Backlog</a>
      <a href="{% url 'sprint_board_page' %}">Sprints</a>
      <a href="{% url 'task_page' %}">Tasks</a>
      <a href="{% url 'boards' %}">Board</a>
      <a href="{% url 'team_page' %}">Team</a>
      <a href="{% url 'logout' %}">Logout</a>
    {% else %}
      <a href="{% url 'login' %}">Login</a>
      <a href="{% url 'register' %}">Register</a>
    {% endif %}
  </nav>

  <div class="container mt-5">
    {% block content %}
    {% endblock %}
    <div class="page-bottom-space"></div>
  </div>

  <footer>
    <p>&copy; {% now "Y" %} PDMS Project - Developed by Agile Wildcats Team for Class Project SFWE 507</p>
  </footer>
</body>
</html>
