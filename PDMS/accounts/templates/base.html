<!DOCTYPE html>
<html lang="en">
  <!-- Base HTML structure for PDMS -->
  <!-- Author: Simon Gawar Dak -->
  <!-- Date: 2026-25-02 -->
<head>
  <meta charset="UTF-8">
  <title>{% block title %}PDMS{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e0e0e0; /* grey background */
      margin: 0;
      padding: 0;
    }
    footer {
      background: #007bff;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand">Agile Wildcats</span>
      <div>
        <a href="{% url 'home' %}" class="nav-link d-inline text-white">Home</a>
        <a href="{% url 'task_page' %}" class="nav-link d-inline text-white">Tasks</a>
        <a href="/admin/" class="nav-link d-inline text-white">Admin</a>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container mt-5">
    {% block content %}
    {% endblock %}
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; {% now "Y" %} PDMS Project — Developed by Agile Wildcats Team for Class Project SFWE 507</p>
  </footer>
</body>
</html>
