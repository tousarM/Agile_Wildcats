<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Team</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background: linear-gradient(135deg, #1f2937, #111827);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial;
}
.login-card {
  background: white;
  padding: 40px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.login-title {
  text-align: center;
  margin-bottom: 25px;
  font-weight: 600;
}
label {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  display: block;
}
.links { text-align: center; margin-top: 15px; }
.links a { text-decoration: none; font-size: 14px; }
</style>
</head>
<body>
<div class="login-card">
  <h3 class="login-title">Create a Team</h3>
  {% if form.errors %}
  <div class="alert alert-danger">
    {% for error in form.name.errors %}{{ error }}{% endfor %}
  </div>
  {% endif %}
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label>Team Name</label>
      {{ form.name }}
    </div>
    <button class="btn btn-primary w-100">Create Team</button>
  </form>
  <div class="links">
    <a href="{% url 'home' %}">Back to Dashboard</a>
  </div>
</div>
</body>
</html>
