<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background: linear-gradient(135deg, #1f2937, #111827);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial;
  padding: 40px 0;
}
.login-card {
  background: white;
  padding: 40px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}
.login-title {
  text-align: center;
  margin-bottom: 25px;
  font-weight: 600;
}
.links {
  text-align: center;
  margin-top: 15px;
}
.links a {
  text-decoration: none;
  font-size: 14px;
}
label {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  display: block;
}
</style>
</head>
<body>
<div class="login-card">
  <h3 class="login-title">Create Account</h3>
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label>Username</label>
      {{ form.username }}
    </div>
    {% if form.username.errors %}
      <div class="text-danger" style="font-size:13px; margin-top:-8px; margin-bottom:8px;">
        {{ form.username.errors|join:", " }}
      </div>
    {% endif %}
    <div class="mb-3">
      <label>Full Name</label>
      {{ form.name }}
    </div>
    <div class="mb-3">
      <label>Email</label>
      {{ form.email }}
    </div>
    <div class="mb-3">
      <label>Password</label>
      {{ form.password }}
    </div>
    <button class="btn btn-primary w-100">Register</button>
  </form>
  <div class="links">
    <a href="/login/">Already have an account? Login</a>
  </div>
</div>
</body>
</html>
