apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdms-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pdms
  template:
    metadata:
      labels:
        app: pdms
    spec:
      containers:
        - name: pdms
          image: agilewildcats/pdms:latest   
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: pdms-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
