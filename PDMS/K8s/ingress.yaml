apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdms-ingress
  labels:
    app: pdms
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"   # Force HTTPS
    nginx.ingress.kubernetes.io/proxy-body-size: "10m" # Allow larger uploads if needed
spec:
  ingressClassName: nginx
  rules:
    - host: pdms.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pdms-service
                port:
                  number: 80
  tls:
    - hosts:
        - pdms.local
      secretName: pdms-tls
