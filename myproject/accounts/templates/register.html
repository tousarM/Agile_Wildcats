{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow">
<div class="card-body">

<h3 class="text-center mb-4">Create Account</h3>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Username</label>
{{ form.username }}
</div>

<div class="mb-3">
<label>Full Name</label>
{{ form.name }}
</div>

<div class="mb-3">
<label>Email</label>
{{ form.email }}
</div>

<div class="mb-3">
<label>Role</label>
{{ form.role }}
</div>

<div class="mb-3">
<label>Team / Project</label>
{{ form.team }}
</div>

<div class="mb-3">
<label>Password</label>
{{ form.password }}
</div>

<button class="btn btn-primary w-100">Register</button>

</form>

<p class="text-center mt-3">
Already have an account?
<a href="/login/">Login</a>
</p>

</div>
</div>

</div>
</div>

{% endblock %}
